{% load static %}
{% load compress %}
<!DOCTYPE html>
<html lang="en" dir="rtl" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احراز هویت</title>
    <link rel="stylesheet" href="{% static 'styles/app.css' %}">

</head>

<body>



<!-- ALL ICONS -->
<svg class="hidden">
    <symbol id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path fill-rule="evenodd"
              d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"
              clip-rule="evenodd" ></path>
    </symbol>
    <symbol id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path
                d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z"></path>
    </symbol>
</svg>

<section class="relative flex items-center justify-center min-h-screen w-full">
    <!-- background -->
    <div class="pointer-events-none absolute inset-0 flex w-screen items-center justify-center overflow-hidden
  [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_0%,rgba(255,255,255,0)_85%)]">

        <svg class="absolute left-0 top-0 h-full w-full stroke-black/10 stroke-[2] [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_20%,rgba(255,255,255,0)_95%)] dark:stroke-white/10">
            <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern)"></rect>
            <defs>
                <pattern id="grid-pattern" viewBox="0 0 64 64" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path d="M64 0H0V64" fill="none"></path>
                </pattern>
            </defs>
        </svg>
    </div>

    <div class="relative w-[27rem] mx-5 flex flex-col justify-center py-12 px-4 md:px-8 bg-white dark:bg-gray-800 shadow-md rounded-xl">
        <div class="flex items-center justify-center">
            <a href="#" class="flex flex-col text-center">
                <span class="font-MorabbaMedium text-4xl flex items-center" content="">
                      گیتار
                    <span class="text-blue-500">
                        CLP
                    </span>
                </span>
            </a>
        </div>
        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <p class="mb-2 text-gray-800 dark:text-gray-100 font-DanaMedium text-lg">ورود کد یکبارمصرف</p>
            <form class="space-y-5" action="#" method="POST">
                {% csrf_token %}
                <div>
                    <label class="block text-sm/6 font-medium text-gray-500 dark:text-gray-300">{% if messages %}
                        {% for msg in messages %}
                            <script>
                                document.addEventListener("DOMContentLoaded", function(){
                                    showToast("{{ msg|escapejs }}", "{{ msg.tags|default:'info' }}");
                                });
                            </script>
                        {% endfor %}
                    {% endif %}</label>
                    <div class="mt-3">
                        {{ form.code }}
                    </div>
                </div>
                <button type="submit" class="submit-btn">ورود</button>
            </form>
        </div>
    </div>
</section>

<script src="{% static 'scripts/app.js' %}"></script>
<script>
        document.addEventListener("DOMContentLoaded", function () {

            window.showToast = function(message, type = "success") {

                const container = document.getElementById("toastContainer");
                if (!container) return;

                const toast = document.createElement("div");
                toast.className = `custom-toast toast-${type}`;

                toast.innerHTML = `
            <div>${message}</div>
            <button>&times;</button>
        `;

                container.appendChild(toast);

                // Animate in
                setTimeout(() => toast.classList.add("show"), 10);

                function removeToast() {
                    toast.classList.remove("show");
                    setTimeout(() => toast.remove(), 400);
                }

                // Auto remove after 3.5s
                const autoRemove = setTimeout(removeToast, 3500);

                // Manual close
                toast.querySelector("button").addEventListener("click", function() {
                    clearTimeout(autoRemove);
                    removeToast();
                });

                // Pause on hover
                toast.addEventListener("mouseenter", () => clearTimeout(autoRemove));
                toast.addEventListener("mouseleave", () => setTimeout(removeToast, 2000));
            };

        });
    </script>


    <style>
        .custom-toast {
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            backdrop-filter: blur(6px);
            opacity: 0;
            transform: translateX(60px);
            transition: all 0.4s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* Color scheme for guitar shop vibe */
        .toast-success { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .toast-danger  { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .toast-warning { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .toast-info    { background: linear-gradient(135deg, #2563eb, #1e40af); }

        .custom-toast button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .custom-toast button:hover {
            color: #fff;
        }
    </style>
</body>


</html>
